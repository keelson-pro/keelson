apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ${ProjectName}-clusterrole-checksum
rules:
  # Workloads Keelson reads, watches, and updates the image on
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # Trigger a one-off Job from a CronJob — kubectl create job --from=cronjob/<name>
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create"]

  # Per-registry credential Secrets (image pull secrets in workloads' namespaces)
  # and workload ServiceAccounts (for KEELSON_RESPECT_SA_PULL_SECRETS walk).
  - apiGroups: [""]
    resources: ["secrets", "serviceaccounts"]
    verbs: ["get"]
