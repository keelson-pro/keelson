apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ${ProjectName}-clusterrole-checksum
  labels:
    kaptain.org/environment: ${Environment}
    kaptain.org/product: ${ProductName}
    kaptain.org/project-name: ${ProjectName}
    kaptain.org/version: "${Version}"
    kaptain.org/owner: ${RepositoryOwner}
    app.kubernetes.io/name: ${ProjectName}
    app.kubernetes.io/instance: ${ProjectName}
    app.kubernetes.io/version: "${Version}"
    app.kubernetes.io/managed-by: Kaptain
    app: ${ProjectName}
    app.kubernetes.io/part-of: ${ProductName}
  annotations:
    kaptain.org/source-repository: ${RepositoryOwner}/${RepositoryName}
rules:
  # Workloads Keelson reads, watches, and updates the image on
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "patch", "update"]

  # Trigger a one-off Job from a CronJob — kubectl create job --from=cronjob/<name>
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create"]

  # Per-registry credential Secrets (image pull secrets in workloads' namespaces)
  # and workload ServiceAccounts (for KEELSON_RESPECT_SA_PULL_SECRETS walk).
  - apiGroups: [""]
    resources: ["secrets", "serviceaccounts"]
    verbs: ["get"]
