apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${ProjectName}
  namespace: ${Environment}
spec:
  # Single replica + Recreate strategy: Keelson is the sole writer to keelson-state,
  # and the directory-based work queue lives on the pod filesystem.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ${ProjectName}
  template:
    metadata:
      labels:
        app: ${ProjectName}
    spec:
      serviceAccountName: ${ProjectName}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ${ProjectName}
          image: ${Keelson/EnvironmentDockerRegistryAndNamespace}/keelson/keelson-package:${Keelson/PackageVersion}
          imagePullPolicy: IfNotPresent
          command: ["keelson"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: KEELSON_LOG_FORMAT
              value: "${Keelson/LogFormat}"
            - name: KEELSON_LOG_LEVEL
              value: "${Keelson/LogLevel}"
            - name: KEELSON_SCOPE
              value: "${Keelson/Scope}"
            - name: KEELSON_CONFIG_MODE
              value: "${Keelson/ConfigMode}"
            - name: KEELSON_RESPECT_SA_PULL_SECRETS
              value: "${Keelson/RespectServiceAccountPullSecrets}"
            - name: KEELSON_WATCHED_KINDS
              value: "${Keelson/WatchedKinds}"
            - name: KEELSON_POLL_INTERVAL
              value: "${Keelson/PollInterval}"
            - name: KEELSON_FULL_REFRESH_INTERVAL
              value: "${Keelson/FullRefreshInterval}"
            - name: KEELSON_TICK_INTERVAL
              value: "${Keelson/TickInterval}"
            - name: KEELSON_HEARTBEAT_MAX_AGE
              value: "${Keelson/HeartbeatMaxAge}"
            - name: KEELSON_WATCHER_BACKOFF_MAX
              value: "${Keelson/WatcherBackoffMax}"
            - name: KEELSON_WATCHER_HEALTHY_RESET
              value: "${Keelson/WatcherHealthyReset}"
            - name: KEELSON_WATCHER_RECONNECT_INITIAL
              value: "${Keelson/WatcherReconnectInitial}"
            - name: KEELSON_WATCHER_RECONNECT_MAX
              value: "${Keelson/WatcherReconnectMax}"
            - name: KEELSON_STATE_CONFIGMAP
              value: "${Keelson/StateConfigMap}"
          startupProbe:
            exec:
              command: ["keelson-probe", "startup"]
            # Allow up to ~2 min for watchers to establish and the first scan
            # to land. failureThreshold * periodSeconds = budget.
            periodSeconds: 5
            failureThreshold: 24
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command: ["keelson-probe", "readiness"]
            periodSeconds: 10
            failureThreshold: 2
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["keelson-probe", "liveness"]
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3
          volumeMounts:
            - name: config
              mountPath: /configmap
              readOnly: true
            - name: work
              mountPath: /keelson/work
            - name: home
              mountPath: /home/keelson
      volumes:
        - name: config
          configMap:
            name: ${ProjectName}-configmap-checksum
            optional: true
        - name: work
          emptyDir: {}
        - name: home
          emptyDir: {}
